# Nginx reverse proxy for HomePilot Container
# Routes all traffic through a single port (7860)

worker_processes auto;
pid /var/run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Logging
    access_log /var/log/nginx/access.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Common proxy parameters shared by every backend-bound location.
    # Keeping them in a named map lets us update timeouts / headers in
    # one place instead of copy-pasting across every location block.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;

    # Needed so the `Connection: upgrade` header only fires on WS
    # upgrades — otherwise keep-alive is kept on plain HTTP.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 7860;
        server_name _;

        # ────────────────────────────────────────────────────────
        # Backend-prefixed routes (regex locations beat prefix
        # locations in nginx's resolution order, so they match
        # before the static-file handler below).
        #
        # Keeping the list explicit rather than "everything that
        # isn't /assets/" means we never accidentally proxy a
        # request for an asset that happens to live outside the
        # /assets bundle (favicon, robots.txt, sourcemaps, …).
        # ────────────────────────────────────────────────────────
        location ~ ^/(api|v1|studio|files|files-legacy|view|preflight|models|openapi\.json|docs|redoc)(/|$) {
            proxy_pass http://127.0.0.1:8000;
        }

        # Health check — explicit short-circuit so load balancers
        # don't traverse the regex block.
        location = /health {
            proxy_pass http://127.0.0.1:8000/api/health;
        }

        # ────────────────────────────────────────────────────────
        # Frontend SPA
        # ────────────────────────────────────────────────────────
        location / {
            root /home/user/app/static;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache fingerprinted static assets aggressively. The
            # Vite build emits hashed filenames so immutable caching
            # is safe; index.html stays un-cached so new releases
            # propagate instantly.
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
