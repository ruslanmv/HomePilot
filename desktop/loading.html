<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>HomePilot</title>
<style>
  :root {
    --bg-deep: #050a18;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-deep);
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Background orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.1;
    animation: float 10s ease-in-out infinite;
  }

  .orb-1 {
    width: 400px; height: 400px;
    background: var(--accent-blue);
    top: -100px; left: -100px;
  }

  .orb-2 {
    width: 300px; height: 300px;
    background: var(--accent-purple);
    bottom: -80px; right: -80px;
    animation-delay: -4s;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fade-in 0.6s ease;
  }

  /* Spinner ring */
  .spinner {
    width: 52px; height: 52px;
    position: relative;
    margin-bottom: 28px;
  }

  .spinner::before, .spinner::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2.5px solid transparent;
  }

  .spinner::before {
    border-top-color: var(--accent-blue);
    border-right-color: var(--accent-purple);
    animation: spin 1s linear infinite;
  }

  .spinner::after {
    inset: 6px;
    border-bottom-color: rgba(59, 130, 246, 0.3);
    animation: spin 1.5s linear infinite reverse;
  }

  .text {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .hint {
    font-size: 12px;
    color: var(--text-muted);
    transition: opacity 0.3s ease;
  }

  .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(20px, -20px); }
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes dots {
    0%  { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="content">
  <div class="spinner"></div>
  <p class="text">Connecting to HomePilot<span class="dots"></span></p>
  <p class="hint" id="hint">Starting backend services</p>
</div>

<script>
  let attempts = 0;
  const maxAttempts = 60;
  const hint = document.getElementById('hint');

  const messages = [
    'Starting backend services',
    'Initializing AI engine',
    'Loading persona system',
    'Preparing workspace',
  ];

  function tryConnect() {
    attempts++;
    if (attempts % 5 === 0 && attempts < 20) {
      hint.textContent = messages[Math.min(Math.floor(attempts / 5), messages.length - 1)];
    }

    fetch('/api/health')
      .then(r => { if (r.ok) window.location.reload(); else throw new Error(); })
      .catch(() => {
        if (attempts < maxAttempts) {
          setTimeout(tryConnect, 1500);
        } else {
          hint.textContent = 'Taking longer than expected — please wait...';
        }
      });
  }

  setTimeout(tryConnect, 2000);
</script>

</body>
</html>
