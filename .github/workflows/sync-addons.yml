##############################################################################
# Sync Community Addons to Gallery
#
# Merges addon persona packs (community/addons/*/) into the gallery
# registry and uploads to Cloudflare R2.
#
# Currently syncs:
#   - chata/  → 14 Chata social personas (NSFW section)
#
# Required Secrets:
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, CLOUDFLARE_ACCOUNT_ID,
#   R2_BUCKET_NAME, CLOUDFLARE_API_TOKEN (optional, for cache purge)
##############################################################################
name: Sync Addons to Gallery

on:
  push:
    branches: [main, master]
    paths:
      - 'community/addons/**'
      - 'community/sample/registry.json'
      - 'community/scripts/sync-addons.py'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    name: Sync addons → R2 gallery
    runs-on: ubuntu-latest
    concurrency:
      group: gallery-addon-sync
      cancel-in-progress: false

    env:
      R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AWS CLI
        run: pip install awscli

      - name: Run sync-addons
        run: python community/scripts/sync-addons.py --upload

      - name: Purge gallery cache
        if: secrets.CLOUDFLARE_API_TOKEN != ''
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ACCOUNT_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"files":["https://homepilot-persona-gallery.cloud-data.workers.dev/registry.json"]}' \
            || echo "Cache purge skipped"
