name: Oracle Cloud (Always Free) Web Deployment

on:
  push:
    branches: [master]
    paths:
      - "oracle/**"
      - "notifications/**"
      - ".github/workflows/oracle.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy after publishing the image
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: oracle-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/homepilot-oracle

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: echo "ref=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: oracle/Dockerfile
          push: true
          # Multi-arch so the image runs on both Always Free shapes:
          #   - VM.Standard.A1.Flex  (Ampere ARM, up to 4 OCPU / 24 GB) -> linux/arm64
          #   - VM.Standard.E2.1.Micro (AMD x86_64, 1 GB)               -> linux/amd64
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/homepilot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' || inputs.deploy
    needs: build
    runs-on: ubuntu-latest
    environment: oracle-production
    steps:
      - uses: actions/checkout@v4

      # Fail early with an actionable message instead of appleboy/ssh-action's
      # cryptic "missing server host" when config is absent. Each value is read
      # as `vars.X || secrets.X`, so it works whether you stored it as an
      # Environment *variable* or an Environment *secret* on 'oracle-production'.
      # Required: ORACLE_HOST, ORACLE_USER, ORACLE_SSH_PRIVATE_KEY,
      #           HOMEPILOT_DOMAIN, ACME_EMAIL, and HOMEPILOT_API_KEY (or API_KEY).
      - name: Verify deployment config
        env:
          ORACLE_HOST: ${{ vars.ORACLE_HOST || secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ vars.ORACLE_USER || secrets.ORACLE_USER }}
          ORACLE_SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          HOMEPILOT_DOMAIN: ${{ vars.HOMEPILOT_DOMAIN || secrets.HOMEPILOT_DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL || secrets.ACME_EMAIL }}
          API_KEY: ${{ secrets.HOMEPILOT_API_KEY || secrets.API_KEY }}
        run: |
          missing=()
          [[ -z "$ORACLE_HOST" ]] && missing+=("ORACLE_HOST")
          [[ -z "$ORACLE_USER" ]] && missing+=("ORACLE_USER")
          [[ -z "$ORACLE_SSH_PRIVATE_KEY" ]] && missing+=("ORACLE_SSH_PRIVATE_KEY (secret)")
          [[ -z "$HOMEPILOT_DOMAIN" ]] && missing+=("HOMEPILOT_DOMAIN")
          [[ -z "$ACME_EMAIL" ]] && missing+=("ACME_EMAIL")
          [[ -z "$API_KEY" ]] && missing+=("HOMEPILOT_API_KEY (secret)")
          if (( ${#missing[@]} )); then
            echo "::error::Missing required config on the 'oracle-production' environment: ${missing[*]}"
            echo "Add each as an Environment variable OR secret (either works):"
            echo "  ORACLE_HOST, ORACLE_USER, HOMEPILOT_DOMAIN, ACME_EMAIL"
            echo "  ORACLE_SSH_PRIVATE_KEY (secret), HOMEPILOT_API_KEY (secret)"
            exit 1
          fi
          echo "All required Oracle deployment config is present."

      # Copy the deployment files to a user-writable staging dir. /opt is
      # root-owned, so we land in $HOME here and sudo-move into place next.
      - name: Upload deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.ORACLE_HOST || secrets.ORACLE_HOST }}
          username: ${{ vars.ORACLE_USER || secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          port: ${{ vars.ORACLE_SSH_PORT || secrets.ORACLE_SSH_PORT || 22 }}
          # Copy the whole directory (not oracle/*) so the .env.example dotfile
          # is included; strip the leading "oracle/" path component.
          source: "oracle"
          target: "homepilot-deploy"
          strip_components: 1
          overwrite: true

      # Idempotent bootstrap + deploy. Works on a bare instance: creates
      # /opt/homepilot, installs Docker/swap/firewall on first run, seeds
      # .env from CI config the first time (preserved on later runs), then
      # updates the image tag and (re)starts the stack.
      - name: Bootstrap and deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REF: ${{ needs.build.outputs.image_ref }}
          HOMEPILOT_DOMAIN: ${{ vars.HOMEPILOT_DOMAIN || secrets.HOMEPILOT_DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL || secrets.ACME_EMAIL }}
          API_KEY: ${{ secrets.HOMEPILOT_API_KEY || secrets.API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          host: ${{ vars.ORACLE_HOST || secrets.ORACLE_HOST }}
          username: ${{ vars.ORACLE_USER || secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          port: ${{ vars.ORACLE_SSH_PORT || secrets.ORACLE_SSH_PORT || 22 }}
          envs: IMAGE_REF,HOMEPILOT_DOMAIN,ACME_EMAIL,API_KEY,OPENAI_API_KEY,ANTHROPIC_API_KEY
          script_stop: true
          script: |
            set -Eeuo pipefail
            SRC="$HOME/homepilot-deploy"

            # Place the deployment files under /opt/homepilot (root-owned).
            sudo install -d -m 0755 /opt/homepilot
            sudo cp -R "$SRC"/. /opt/homepilot/
            cd /opt/homepilot

            # First-run bootstrap: Docker, firewall, swap (install.sh is idempotent).
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found — bootstrapping the instance..."
              sudo bash install.sh
            fi

            # Write .env from CI config on EVERY run (CI is the source of
            # truth), so a stale/placeholder value — e.g. a leftover
            # API_KEY=replace-... from an earlier attempt — is self-healed
            # instead of being kept forever. Generated inline (not copied from
            # .env.example) so it doesn't depend on that dotfile being shipped.
            # All persistent config belongs in the oracle-production
            # environment, not in hand edits on the box.
            echo "Writing .env from CI config..."
            : "${HOMEPILOT_DOMAIN:?set the HOMEPILOT_DOMAIN variable on the oracle-production environment}"
            : "${ACME_EMAIL:?set the ACME_EMAIL variable on the oracle-production environment}"
            : "${API_KEY:?set the HOMEPILOT_API_KEY secret on the oracle-production environment}"
            # Build .env line-by-line (no heredoc) so YAML block indentation
            # can't corrupt the file or the terminator.
            {
              echo "HOMEPILOT_DOMAIN=${HOMEPILOT_DOMAIN}"
              echo "ACME_EMAIL=${ACME_EMAIL}"
              echo "HOMEPILOT_IMAGE=${IMAGE_REF}"
              echo "HOMEPILOT_BIND_ADDRESS=127.0.0.1"
              echo "API_KEY=${API_KEY}"
              echo "HOMEPILOT_EDITION=web"
              echo "PUBLIC_BASE_URL=https://${HOMEPILOT_DOMAIN}"
              # Point storage at the mounted, writable volume. In Docker the app
              # otherwise defaults its data root to /app/data (root-owned, not
              # writable by the 'user' account), so the backend crash-loops on
              # startup with PermissionError creating /app/data/uploads. This
              # image mounts homepilot-data at /home/user/app/data.
              echo "DATA_DIR=/home/user/app/data"
              echo "OUTPUT_DIR=/home/user/app/data/outputs"
              echo "HOMEPILOT_LLM_BACKEND=openai"
              echo "OPENAI_API_KEY=${OPENAI_API_KEY:-}"
              echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}"
              echo "INTERACTIVE_ENABLED=true"
              echo "INTERACTIVE_PLAYBACK_LLM=false"
              echo "INTERACTIVE_PLAYBACK_RENDER=false"
            } | sudo tee .env >/dev/null

            # Run via sudo so it works before the docker-group membership added
            # by install.sh takes effect in a new login session.
            sudo bash deploy.sh
