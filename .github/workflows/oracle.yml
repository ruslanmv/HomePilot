name: Oracle Cloud (Always Free) Web Deployment

on:
  push:
    branches: [master]
    paths:
      - "oracle/**"
      - "notifications/**"
      - ".github/workflows/oracle.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy after publishing the image
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: oracle-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/homepilot-oracle

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: echo "ref=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: oracle/Dockerfile
          push: true
          # Multi-arch so the image runs on both Always Free shapes:
          #   - VM.Standard.A1.Flex  (Ampere ARM, up to 4 OCPU / 24 GB) -> linux/arm64
          #   - VM.Standard.E2.1.Micro (AMD x86_64, 1 GB)               -> linux/amd64
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/homepilot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' || inputs.deploy
    needs: build
    runs-on: ubuntu-latest
    environment: oracle-production
    steps:
      # Fail early with an actionable message instead of appleboy/ssh-action's
      # cryptic "missing server host" when a secret is absent. The three below
      # must be set as Environment secrets on 'oracle-production'
      # (Settings → Environments → oracle-production → Environment secrets).
      - name: Verify deployment secrets
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
        run: |
          missing=()
          [[ -z "$ORACLE_HOST" ]] && missing+=("ORACLE_HOST")
          [[ -z "$ORACLE_USER" ]] && missing+=("ORACLE_USER")
          [[ -z "$ORACLE_SSH_PRIVATE_KEY" ]] && missing+=("ORACLE_SSH_PRIVATE_KEY")
          if (( ${#missing[@]} )); then
            echo "::error::Missing required secret(s) in the 'oracle-production' environment: ${missing[*]}"
            echo "Add them under Settings → Environments → oracle-production → Environment secrets:"
            echo "  ORACLE_HOST             = the instance public IP (e.g. 193.122.156.100)"
            echo "  ORACLE_USER             = SSH user (opc on Oracle Linux, ubuntu on Ubuntu)"
            echo "  ORACLE_SSH_PRIVATE_KEY  = full private key PEM matching authorized_keys"
            echo "  ORACLE_SSH_PORT         = optional; defaults to 22"
            exit 1
          fi
          echo "All required Oracle deployment secrets are present."

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          port: ${{ secrets.ORACLE_SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /opt/homepilot
            sed -i 's|^HOMEPILOT_IMAGE=.*|HOMEPILOT_IMAGE=${{ needs.build.outputs.image_ref }}|' .env
            bash deploy.sh
