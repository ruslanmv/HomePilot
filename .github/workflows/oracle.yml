name: Oracle Cloud (Always Free) Web Deployment

on:
  push:
    branches: [master]
    paths:
      - "oracle/**"
      - "notifications/**"
      - ".github/workflows/oracle.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy after publishing the image
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: oracle-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/homepilot-oracle

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: echo "ref=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: oracle/Dockerfile
          push: true
          # Multi-arch so the image runs on both Always Free shapes:
          #   - VM.Standard.A1.Flex  (Ampere ARM, up to 4 OCPU / 24 GB) -> linux/arm64
          #   - VM.Standard.E2.1.Micro (AMD x86_64, 1 GB)               -> linux/amd64
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/homepilot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' || inputs.deploy
    needs: build
    runs-on: ubuntu-latest
    environment: oracle-production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          port: ${{ secrets.ORACLE_SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /opt/homepilot
            sed -i 's|^HOMEPILOT_IMAGE=.*|HOMEPILOT_IMAGE=${{ needs.build.outputs.image_ref }}|' .env
            bash deploy.sh
