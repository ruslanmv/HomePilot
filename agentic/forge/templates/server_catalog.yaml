version: 1

# Server catalog: defines all HomePilot MCP servers.
# "core" servers start automatically and cannot be uninstalled.
# "optional" servers can be installed/uninstalled via the UI.

core:
  - id: hp-personal-assistant
    port: 9101
    module: "agentic.integrations.mcp.personal_assistant_server:app"
    label: "Personal Assistant"
    description: "Search personal notes/memory, plan your day"
    category: core

  - id: hp-knowledge
    port: 9102
    module: "agentic.integrations.mcp.knowledge_server:app"
    label: "Knowledge"
    description: "Search workspace, fetch documents, answer with sources"
    category: core

  - id: hp-decision-copilot
    port: 9103
    module: "agentic.integrations.mcp.decision_copilot_server:app"
    label: "Decision Copilot"
    description: "Generate options, assess risks, recommend next steps"
    category: core

  - id: hp-executive-briefing
    port: 9104
    module: "agentic.integrations.mcp.executive_briefing_server:app"
    label: "Executive Briefing"
    description: "Daily/weekly digests, change summaries"
    category: core

  - id: hp-web-search
    port: 9105
    module: "agentic.integrations.mcp.web_search_server:app"
    label: "Web Search"
    description: "Web search via SearXNG or Tavily, URL fetch"
    category: core

  - id: hp-inventory
    port: 9120
    module: "agentic.integrations.mcp.inventory_server:app"
    label: "Inventory"
    description: "Browse outfits, photos, documents"
    category: core

optional:
  # ── Local Tools ──────────────────────────────────────────────────────
  - id: hp-local-notes
    port: 9110
    module: "agentic.integrations.mcp.local_notes_server:app"
    label: "Local Notes"
    description: "Search, read, create, append, update, delete notes"
    category: local
    icon: file-text

  - id: hp-local-projects
    port: 9111
    module: "agentic.integrations.mcp.local_projects_server:app"
    label: "Local Projects"
    description: "List, read, search, write project files"
    category: local
    icon: folder-open

  - id: hp-web-fetch
    port: 9112
    module: "agentic.integrations.mcp.web_mcp_server:app"
    label: "Web Fetch"
    description: "Fetch and extract text from any URL"
    category: local
    icon: globe

  - id: hp-shell-safe
    port: 9113
    module: "agentic.integrations.mcp.shell_safe_server:app"
    label: "Shell (Safe)"
    description: "Execute allowlisted shell commands (read-first)"
    category: local
    icon: terminal

  # ── Communication ────────────────────────────────────────────────────
  - id: hp-gmail
    port: 9114
    module: "agentic.integrations.mcp.gmail_server:app"
    label: "Gmail"
    description: "Search, read, draft, and send Gmail messages"
    category: communication
    icon: mail
    requires_config: GOOGLE_OAUTH

  - id: hp-google-calendar
    port: 9115
    module: "agentic.integrations.mcp.google_calendar_server:app"
    label: "Google Calendar"
    description: "List, create, and manage Google Calendar events"
    category: communication
    icon: calendar
    requires_config: GOOGLE_OAUTH

  - id: hp-microsoft-graph
    port: 9116
    module: "agentic.integrations.mcp.microsoft_graph_server:app"
    label: "Microsoft Graph"
    description: "Outlook mail, calendar, OneDrive via Microsoft Graph"
    category: communication
    icon: cloud
    requires_config: MS_GRAPH_TOKEN

  - id: hp-slack
    port: 9117
    module: "agentic.integrations.mcp.slack_server:app"
    label: "Slack"
    description: "Search messages, read channels, post updates"
    category: communication
    icon: message-square
    requires_config: SLACK_TOKEN

  - id: hp-whatsapp
    port: 9130
    module: "agentic.integrations.mcp.whatsapp_server:app"
    label: "WhatsApp"
    description: "Send/receive WhatsApp messages via Meta Cloud API. Includes ACK/SNOOZE/ESCALATE intent detection."
    category: communication
    icon: message-circle
    requires_config: WHATSAPP_CLOUD_API

  - id: hp-telegram
    port: 9131
    module: "agentic.integrations.mcp.telegram_server:app"
    label: "Telegram"
    description: "Send messages + voice notes via a Telegram bot. Secret-token webhook verification."
    category: communication
    icon: send
    requires_config: TELEGRAM_BOT

  - id: hp-voip
    port: 9132
    module: "agentic.integrations.mcp.voip_server:app"
    label: "VoIP / Phone"
    description: "Outbound persona calls + inbound DID→persona routing. Single app-DID mode, HMAC webhook verify, incident escalation."
    category: communication
    icon: phone
    requires_config: VOIP_PROVIDER

  # ── Developer ────────────────────────────────────────────────────────
  - id: hp-github
    port: 9118
    module: "agentic.integrations.mcp.github_server:app"
    label: "GitHub"
    description: "Repos, issues, PRs, and release notes"
    category: developer
    icon: github
    requires_config: GITHUB_TOKEN

  - id: hp-notion
    port: 9119
    module: "agentic.integrations.mcp.notion_server:app"
    label: "Notion"
    description: "Search pages, read databases, create content"
    category: developer
    icon: book-open
    requires_config: NOTION_TOKEN


  # ── Community: hello_world_greeter ──
  - id: hp-community-greeter
    port: 9200
    module: "agentic.integrations.mcp.community_greeter_server:app"
    label: "Community Greeter"
    description: "Greeting tools — personalized hellos, farewells, and compliments"
    category: community
    icon: smile

  # ── Community: Microsoft Teams [BETA] ──
  - id: hp-teams
    port: 9106
    label: "Microsoft Teams"
    description: "Teams chats, channels, calendar, and meetings via Graph API"
    category: communication
    icon: message-circle
    requires_config: MS_TEAMS_AUTH
    source:
      type: external
      git: https://github.com/ruslanmv/teams-mcp-server
      ref: master

  # ─────────────────────────────────────────────────────────────────────────
  # Expert Core Services (category: expert_core)
  #
  # The ten MCP servers that back the Expert chat mode (thinking_mode =
  # fast / think / heavy). Source of truth for priorities and API shapes is
  # ``expert/backend/app/expert/mcp_catalog.py``. Each is installable from
  # the Server Management UI so operators can enable the ones they need
  # without running the full preprod sandbox.
  # ─────────────────────────────────────────────────────────────────────────

  - id: mcp-web-search
    port: 9150
    module: "agentic.integrations.mcp.web_search_server:app"
    label: "Web Search (Expert P0)"
    description: "Grounded web retrieval and citation candidates for Expert mode."
    category: expert_core
    icon: globe

  - id: mcp-doc-retrieval
    port: 9151
    module: "agentic.integrations.mcp.doc_retrieval_server:app"
    label: "Doc Retrieval (Expert P0)"
    description: "Private knowledge retrieval and RAG for Expert mode."
    category: expert_core
    icon: file-text

  - id: mcp-memory-store
    port: 9152
    module: "agentic.integrations.mcp.memory_store_server:app"
    label: "Memory Store (Expert P0)"
    description: "Durable memory service with privacy controls for Expert mode."
    category: expert_core
    icon: brain

  - id: mcp-safety-policy
    port: 9153
    module: "agentic.integrations.mcp.safety_policy_server:app"
    label: "Safety Policy (Expert P1)"
    description: "Input/output policy checks and risk scoring for Expert mode."
    category: expert_core
    icon: shield

  - id: mcp-observability
    port: 9154
    module: "agentic.integrations.mcp.observability_server:app"
    label: "Observability (Expert P1)"
    description: "Metrics, traces, and event export for Expert mode."
    category: expert_core
    icon: bar-chart

  - id: mcp-code-sandbox
    port: 9155
    module: "agentic.integrations.mcp.code_sandbox_server:app"
    label: "Code Sandbox (Expert P0)"
    description: "Safe code execution and deterministic computation for Expert mode."
    category: expert_core
    icon: terminal

  - id: mcp-citation-provenance
    port: 9156
    module: "agentic.integrations.mcp.citation_provenance_server:app"
    label: "Citation Provenance (Expert P0)"
    description: "Claim-to-source lineage and citation integrity for Expert mode."
    category: expert_core
    icon: file-text

  - id: mcp-eval-runner
    port: 9157
    module: "agentic.integrations.mcp.eval_runner_server:app"
    label: "Eval Runner (Expert P1)"
    description: "Automated quality / safety / cost evaluation suites for Expert mode."
    category: expert_core
    icon: bar-chart

  - id: mcp-cost-router
    port: 9158
    module: "agentic.integrations.mcp.cost_router_server:app"
    label: "Cost Router (Expert P2)"
    description: "Budget-aware route recommendations and cost recording for Expert mode."
    category: expert_core
    icon: bar-chart

  - id: mcp-job-orchestrator
    port: 9159
    module: "agentic.integrations.mcp.job_orchestrator_server:app"
    label: "Job Orchestrator (Expert P2)"
    description: "Long-running simulation / research job queue for Expert mode."
    category: expert_core
    icon: package
