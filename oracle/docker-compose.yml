services:
  homepilot:
    image: ${HOMEPILOT_IMAGE:-ghcr.io/ruslanmv/homepilot-oracle:latest}
    container_name: homepilot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOMEPILOT_BIND_ADDRESS:-127.0.0.1}:7860:7860"
    volumes:
      - homepilot-data:/home/user/app/data
    # Tuned for VM.Standard.A1.Flex 1 OCPU / 6 GB. Leave ~1 GB for the OS and
    # Caddy; the swap file created by install.sh absorbs short spikes above the
    # RAM limit instead of the kernel OOM-killing the app. Override with
    # HOMEPILOT_MEM_LIMIT / HOMEPILOT_MEMSWAP_LIMIT for larger shapes.
    mem_limit: ${HOMEPILOT_MEM_LIMIT:-5g}
    memswap_limit: ${HOMEPILOT_MEMSWAP_LIMIT:-7g}
    # Probe the backend's real health endpoint directly on :8000. The in-image
    # nginx (on :7860) maps /api/health -> backend /api/health, which does not
    # exist (the backend serves /health), so the old :7860/api/health probe
    # 404'd and the container never became healthy. Hitting :8000/health inside
    # the container avoids that mapping. start_period is generous because the
    # app is slow to import on the 1 OCPU Ampere shape.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: homepilot-caddy
    restart: unless-stopped
    depends_on:
      homepilot:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      HOMEPILOT_DOMAIN: ${HOMEPILOT_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    mem_limit: ${CADDY_MEM_LIMIT:-256m}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  homepilot-data:
  caddy-data:
  caddy-config:
