services:
  homepilot:
    image: ${HOMEPILOT_IMAGE:-ghcr.io/ruslanmv/homepilot-oracle:latest}
    container_name: homepilot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOMEPILOT_BIND_ADDRESS:-127.0.0.1}:7860:7860"
    volumes:
      - homepilot-data:/home/user/app/data
    # Tuned for VM.Standard.A1.Flex 1 OCPU / 6 GB. Leave ~1 GB for the OS and
    # Caddy; the swap file created by install.sh absorbs short spikes above the
    # RAM limit instead of the kernel OOM-killing the app. Override with
    # HOMEPILOT_MEM_LIMIT / HOMEPILOT_MEMSWAP_LIMIT for larger shapes.
    mem_limit: ${HOMEPILOT_MEM_LIMIT:-5g}
    memswap_limit: ${HOMEPILOT_MEMSWAP_LIMIT:-7g}
    # NOTE: the container healthcheck is intentionally disabled. On the 1 OCPU
    # Ampere shape the app took too long / failed to report healthy, which
    # blocked the whole deploy via Caddy's dependency. Without a healthcheck the
    # deploy no longer gates on app readiness — the stack comes up and the app
    # can be debugged live (docker logs). Re-enable once the startup issue is
    # resolved, e.g.:
    #   healthcheck:
    #     test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
    #     interval: 15s
    #     timeout: 10s
    #     retries: 12
    #     start_period: 240s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: homepilot-caddy
    restart: unless-stopped
    depends_on:
      homepilot:
        # No healthcheck on homepilot, so wait only for the container to start.
        # (service_healthy can never be satisfied without a healthcheck.)
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      HOMEPILOT_DOMAIN: ${HOMEPILOT_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    mem_limit: ${CADDY_MEM_LIMIT:-256m}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  homepilot-data:
  caddy-data:
  caddy-config:
