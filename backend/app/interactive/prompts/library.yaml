# Prompt library index — maps stable prompt ids to the YAML files
# that define them. Keep one id per line, grouped by workflow.
#
# Rename rules:
#   * Never rename an id without bumping the `version:` field in the
#     target YAML and updating every call site.
#   * Deleted prompts should stay here with a 'deprecated: true' flag
#     until the next release so tests can catch orphan references.
#
# The loader (PromptLibrary) fails loudly on:
#   * missing id,  missing file,  duplicate id,  non-str value.

prompts:
  # Stage-1 autoplan — one idea → full wizard form. Seven small
  # prompts instead of one monolithic JSON call. Each one is
  # answerable by a 1.5B-7B Qwen/Llama in < 200 tokens.
  autoplan.classify_mode:  autoplan/01_classify_mode.yaml
  autoplan.extract_topic:  autoplan/02_extract_topic.yaml
  autoplan.title:          autoplan/03_title.yaml
  autoplan.brief:          autoplan/04_brief.yaml
  autoplan.audience:       autoplan/05_audience.yaml
  autoplan.shape:          autoplan/06_shape.yaml
  autoplan.seed_intents:   autoplan/07_seed_intents.yaml

  # Stage-2 autogen — turn a persisted plan into a scene graph.
  # Spine emits topology (ids + kinds + edges + choice labels);
  # per-scene script writes the title + narration in a tight fan-
  # out loop so one flaky scene doesn't torpedo the whole graph.
  autogen.scene_spine:     autogen/01_scene_spine.yaml
  autogen.scene_script:    autogen/02_scene_script.yaml

  # Persona Live Play — real-time companion mode. NOT a story graph.
  # opening_turn fires once at session start (the greeting that
  # pops up before the viewer types anything); turn_compose runs
  # every chat turn after that. Both emit the same JSON contract so
  # the player's overlay + llm_composer parser stay unchanged.
  personaplay.opening_turn: personaplay/01_opening_turn.yaml
  personaplay.turn_compose: personaplay/02_turn_compose.yaml
