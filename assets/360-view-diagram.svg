<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bg)"/>
  <rect width="900" height="520" rx="16" fill="none" stroke="#a855f7" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="white" font-size="18" font-weight="700" letter-spacing="0.5">360° View Pack — How It Works</text>
  <rect x="300" y="46" width="300" height="2" rx="1" fill="url(#purpleGrad)" opacity="0.5"/>

  <!-- ═══════════════ ROW 1: Anchor Face ═══════════════ -->
  <rect x="350" y="62" width="200" height="56" rx="12" fill="#1e1535" stroke="#a855f7" stroke-opacity="0.4"/>
  <circle cx="390" cy="90" r="16" fill="#2d1f4e" stroke="#a855f7" stroke-opacity="0.3"/>
  <text x="390" y="95" text-anchor="middle" fill="#c084fc" font-size="16">&#x1F464;</text>
  <text x="460" y="86" text-anchor="middle" fill="white" font-size="13" font-weight="600">Anchor Face</text>
  <text x="460" y="102" text-anchor="middle" fill="white" font-size="10" opacity="0.45">Front reference image</text>

  <!-- Arrow down from anchor -->
  <line x1="450" y1="118" x2="450" y2="150" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ═══════════════ ROW 2: Four angle generators ═══════════════ -->
  <rect x="30" y="155" width="840" height="140" rx="14" fill="#150f22" stroke="white" stroke-opacity="0.06"/>
  <text x="450" y="178" text-anchor="middle" fill="white" font-size="12" font-weight="600" opacity="0.5">VIEW PACK GENERATOR</text>

  <!-- Front card -->
  <rect x="55" y="192" width="170" height="88" rx="10" fill="#1a1230" stroke="#22d3ee" stroke-opacity="0.4"/>
  <text x="140" y="213" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="700">FRONT  0°</text>
  <text x="140" y="232" text-anchor="middle" fill="white" font-size="10" opacity="0.6">Identity (InstantID)</text>
  <text x="140" y="250" text-anchor="middle" fill="white" font-size="10" opacity="0.4">denoise 0.85</text>
  <text x="140" y="268" text-anchor="middle" fill="#22d3ee" font-size="10" opacity="0.7">facing camera</text>

  <!-- Right card -->
  <rect x="255" y="192" width="170" height="88" rx="10" fill="#1a1230" stroke="#a855f7" stroke-opacity="0.4"/>
  <text x="340" y="213" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="700">RIGHT  90°</text>
  <text x="340" y="232" text-anchor="middle" fill="white" font-size="10" opacity="0.6">Reference (img2img)</text>
  <text x="340" y="250" text-anchor="middle" fill="white" font-size="10" opacity="0.4">denoise 0.78</text>
  <text x="340" y="268" text-anchor="middle" fill="#c084fc" font-size="10" opacity="0.7">facing right →</text>

  <!-- Back card -->
  <rect x="455" y="192" width="170" height="88" rx="10" fill="#1a1230" stroke="#f59e0b" stroke-opacity="0.4"/>
  <text x="540" y="213" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">BACK  180°</text>
  <text x="540" y="232" text-anchor="middle" fill="white" font-size="10" opacity="0.6">Reference (img2img)</text>
  <text x="540" y="250" text-anchor="middle" fill="white" font-size="10" opacity="0.4">denoise 0.90</text>
  <text x="540" y="268" text-anchor="middle" fill="#fbbf24" font-size="10" opacity="0.7">facing away ↓</text>

  <!-- Left card -->
  <rect x="655" y="192" width="190" height="88" rx="10" fill="#1a1230" stroke="#ec4899" stroke-opacity="0.4"/>
  <text x="750" y="213" text-anchor="middle" fill="#f472b6" font-size="11" font-weight="700">LEFT  270°</text>
  <text x="750" y="232" text-anchor="middle" fill="white" font-size="10" opacity="0.6">Reference (img2img)</text>
  <text x="750" y="250" text-anchor="middle" fill="white" font-size="10" opacity="0.4">denoise 0.78</text>
  <text x="750" y="268" text-anchor="middle" fill="#f472b6" font-size="10" opacity="0.7">prompt → then mirror ←</text>

  <!-- ═══════════════ ROW 3: Auto-Mirror box ═══════════════ -->
  <!-- Arrows down from generators -->
  <line x1="140" y1="280" x2="140" y2="310" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrowCyan)"/>
  <line x1="340" y1="280" x2="340" y2="310" stroke="#a855f7" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <line x1="540" y1="280" x2="540" y2="310" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="750" y1="280" x2="750" y2="310" stroke="#ec4899" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Auto-Mirror section -->
  <rect x="610" y="310" width="270" height="72" rx="10" fill="#1f0f2e" stroke="#ec4899" stroke-opacity="0.35" stroke-dasharray="5 3"/>
  <text x="745" y="332" text-anchor="middle" fill="#f472b6" font-size="11" font-weight="600">AUTO-MIRROR</text>
  <text x="745" y="350" text-anchor="middle" fill="white" font-size="10" opacity="0.5">Left toggle ON → always flip</text>
  <text x="745" y="366" text-anchor="middle" fill="white" font-size="10" opacity="0.5">Right toggle ON → detect + flip</text>

  <!-- pass-through labels for front/right/back -->
  <text x="140" y="328" text-anchor="middle" fill="#22d3ee" font-size="9" opacity="0.5">pass-through</text>
  <text x="340" y="328" text-anchor="middle" fill="#a855f7" font-size="9" opacity="0.5">pass-through</text>
  <text x="540" y="328" text-anchor="middle" fill="#f59e0b" font-size="9" opacity="0.5">pass-through</text>

  <!-- Arrows from auto-mirror row down to orbit viewer -->
  <line x1="140" y1="340" x2="140" y2="404" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrowCyan)"/>
  <line x1="340" y1="340" x2="340" y2="404" stroke="#a855f7" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <line x1="540" y1="340" x2="540" y2="404" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="750" y1="382" x2="750" y2="404" stroke="#ec4899" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ═══════════════ ROW 4: Orbit Viewer ═══════════════ -->
  <rect x="30" y="408" width="840" height="96" rx="14" fill="#150f22" stroke="url(#cyanGrad)" stroke-opacity="0.3"/>
  <text x="450" y="433" text-anchor="middle" fill="white" font-size="13" font-weight="700">360° Orbit Viewer</text>

  <!-- Orbit cycle -->
  <g transform="translate(450, 468)">
    <!-- Angle nodes on a line -->
    <circle cx="-240" cy="0" r="18" fill="#0e2a38" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>
    <text x="-240" y="5" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">F</text>

    <circle cx="-80" cy="0" r="18" fill="#1a0e2e" stroke="#a855f7" stroke-width="1.5"/>
    <text x="-80" y="5" text-anchor="middle" fill="#c084fc" font-size="10" font-weight="700">R</text>

    <circle cx="80" cy="0" r="18" fill="#1a1508" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="80" y="5" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">B</text>

    <circle cx="240" cy="0" r="18" fill="#1f0820" stroke="#ec4899" stroke-width="1.5"/>
    <text x="240" y="5" text-anchor="middle" fill="#f472b6" font-size="10" font-weight="700">L</text>

    <!-- Connection arrows -->
    <line x1="-218" y1="0" x2="-102" y2="0" stroke="white" stroke-opacity="0.2" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="-58" y1="0" x2="58" y2="0" stroke="white" stroke-opacity="0.2" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="102" y1="0" x2="218" y2="0" stroke="white" stroke-opacity="0.2" stroke-width="1" marker-end="url(#arrow)"/>

    <!-- Loop-back arrow (visual cue) -->
    <path d="M 258 -8 Q 300 -35 300 -35 Q 300 -35 0 -35 Q -300 -35 -300 -35 Q -300 -35 -258 -8" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <text x="0" y="-40" text-anchor="middle" fill="white" font-size="9" opacity="0.3">← drag / arrow keys →</text>
  </g>

  <!-- Bottom label -->
  <text x="450" y="512" text-anchor="middle" fill="white" font-size="10" opacity="0.25">Smooth 180ms crossfade between angles  ·  Cached in localStorage per outfit</text>
</svg>
